services:
  incident-copilot:
    build: .
    container_name: incident-copilot-api
    environment:
      MODEL_PATH: /app/models/incident_risk_model.joblib
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1:8b
      POSTGRES_DSN: postgresql://mlops:mlops@postgres:5432/mlops
      FEATURE_STORE_URI: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MODEL_REGISTRY_URI: http://mlflow:5000
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - postgres
      - redis
      - kafka
      - mlflow

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: incident-copilot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: incident-copilot-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: incident-copilot-mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://mlops:mlops@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: incident-copilot-postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops
      POSTGRES_DB: mlops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  mysql:
    image: mysql:8.4
    container_name: incident-copilot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mlops
      MYSQL_DATABASE: mlops
      MYSQL_USER: mlops
      MYSQL_PASSWORD: mlops
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  mongodb:
    image: mongo:7
    container_name: incident-copilot-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: incident-copilot-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.8
    container_name: incident-copilot-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: incident-copilot-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: incident-copilot-logstash
    volumes:
      - ./monitoring/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: incident-copilot-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: incident-copilot-otel
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./monitoring/otel/collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres-data:
  mysql-data:
  mongo-data:
  mlflow-artifacts:
