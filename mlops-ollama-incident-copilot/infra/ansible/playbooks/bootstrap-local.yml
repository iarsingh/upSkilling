---
- name: Bootstrap local MLOps workstation
  hosts: local
  gather_facts: false
  tasks:
    - name: Check Docker
      ansible.builtin.command: docker --version
      changed_when: false

    - name: Check kubectl
      ansible.builtin.command: kubectl version --client=true
      changed_when: false

    - name: Check Helm
      ansible.builtin.command: helm version --short
      changed_when: false

    - name: Check Terraform
      ansible.builtin.command: terraform version
      changed_when: false

    - name: Check Ollama model inventory
      ansible.builtin.command: ollama list
      changed_when: false
      failed_when: false
