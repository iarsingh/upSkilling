apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "incident-copilot.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "incident-copilot.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "incident-copilot.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "incident-copilot.name" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      {{- if .Values.gpu.enabled }}
      nodeSelector:
{{ toYaml .Values.gpu.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.gpu.tolerations | indent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
