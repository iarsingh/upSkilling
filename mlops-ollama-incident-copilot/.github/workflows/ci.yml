name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: PYTHONPATH=src pytest -q
      - name: Docker build
        run: docker build -t incident-copilot:${{ github.sha }} .
      - name: Helm template
        run: helm template incident-copilot ./helm/incident-copilot
