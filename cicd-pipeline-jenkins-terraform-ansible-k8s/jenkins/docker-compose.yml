services:
  jenkins:
    build:
      context: .
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: quiz-jenkins
    ports:
      - "8081:8080"
    environment:
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-admin}
      - KUBECONFIG=/var/jenkins_home/kubeconfig
      # minikube CLI's state dir is $MINIKUBE_HOME itself (must include the
      # trailing .minikube), defaulting to $HOME/.minikube -- but $HOME
      # inside the container is /var/jenkins_home, not the mount below, so
      # point it explicitly at the mounted host path instead.
      - MINIKUBE_HOME=${HOME}/.minikube
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # `minikube image load` needs the CLI's own profile metadata, and
      # writes small lock/cache files there, so this isn't read-only.
      - ${HOME}/.minikube:${HOME}/.minikube
      # Generated by `scripts/generate-jenkins-kubeconfig.sh` -- points at
      # minikube's address on the shared `minikube` docker network
      # (127.0.0.1 inside kubeconfig would resolve to the Jenkins
      # container itself, not the host, so the default kubeconfig doesn't
      # work here).
      - ./kubeconfig.minikube-internal:/var/jenkins_home/kubeconfig:ro
      - ../:/workspace/pipeline
      - ../../interview-quiz-app:/workspace/interview-quiz-app
    networks:
      - default
      - minikube

networks:
  default: {}
  minikube:
    external: true

volumes:
  jenkins_home:
