apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-web
  labels:
    app: quiz-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-web
  template:
    metadata:
      labels:
        app: quiz-web
    spec:
      containers:
        - name: quiz-web
          image: quiz-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # Points quiz-web at the quiz-api microservice over the mesh
            # instead of using its bundled local question bank copy.
            - name: QUIZ_API_URL
              value: http://quiz-api:8000
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
