# Local demo: everything targets this machine directly.
#
# In a real deployment, [ci_agents] would list the Jenkins build-agent VMs
# (e.g. IPs from the terraform/gcp output of a separate compute module) and
# you'd drop the ansible_connection=local override so Ansible SSHes in:
#
#   [ci_agents]
#   jenkins-agent-1 ansible_host=10.20.1.4 ansible_user=ubuntu
#
# `python3` needs the `kubernetes` pip package installed (required by
# kubernetes.core.k8s) in whichever interpreter ansible's auto-discovery
# picks -- see README's "Ansible" section for the one-time setup command
# on a fresh machine.
[ci_agents]
localhost ansible_connection=local

[k8s_control]
localhost ansible_connection=local
