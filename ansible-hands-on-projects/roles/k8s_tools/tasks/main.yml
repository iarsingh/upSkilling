---
- name: Install Kubernetes tooling dependencies
  ansible.builtin.package:
    name:
      - curl
      - tar
    state: present

- name: Install kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubernetes_tools.kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Download Helm archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ kubernetes_tools.helm_version }}-linux-amd64.tar.gz"
    dest: /tmp/helm-linux-amd64.tar.gz
    mode: "0644"

- name: Extract Helm archive
  ansible.builtin.unarchive:
    src: /tmp/helm-linux-amd64.tar.gz
    dest: /tmp
    remote_src: true

- name: Install Helm binary
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    mode: "0755"
    remote_src: true

- name: Create kubeconfig directory
  ansible.builtin.file:
    path: "/home/{{ ops_user }}/.kube"
    state: directory
    owner: "{{ ops_user }}"
    group: "{{ ops_user }}"
    mode: "0700"

