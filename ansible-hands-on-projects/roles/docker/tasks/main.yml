---
- name: Install Docker dependencies
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Install Docker package
  ansible.builtin.package:
    name: docker.io
    state: present

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add users to Docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Create sample app directory
  ansible.builtin.file:
    path: /opt/devops/sample-app
    state: directory
    owner: "{{ ops_user }}"
    group: "{{ ops_user }}"
    mode: "0755"

