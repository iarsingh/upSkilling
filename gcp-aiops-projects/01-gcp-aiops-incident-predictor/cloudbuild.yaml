steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/gcp-aiops-incident-predictor:$SHORT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/gcp-aiops-incident-predictor:$SHORT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gcp-aiops-incident-predictor
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/gcp-aiops-incident-predictor:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

substitutions:
  _REGION: us-central1
  _REPOSITORY: cloud-run-apps

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/gcp-aiops-incident-predictor:$SHORT_SHA
