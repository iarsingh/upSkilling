    <style>
      :root {
        --bg: #f4f7f8;
        --surface: #ffffff;
        --soft: #f7faf9;
        --ink: #101827;
        --muted: #62707e;
        --line: #dce5e8;
        --accent: #0f766e;
        --accent-2: #2563eb;
        --gold: #a16207;
        --dark: #17212b;
        --dark-2: #233342;
        --shadow: 0 22px 70px rgba(16, 24, 39, 0.12);
        --radius: 18px;
      }

      @keyframes drift {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
        50% {
          transform: translate3d(18px, -14px, 0) rotate(4deg);
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
      }

      @keyframes pulse {
        0%, 100% {
          box-shadow: 0 0 0 6px rgba(15, 118, 110, 0.14);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(15, 118, 110, 0.06);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.13) 0 18%, transparent 18% 100%),
          linear-gradient(225deg, rgba(37, 99, 235, 0.1) 0 16%, transparent 16% 100%),
          linear-gradient(90deg, rgba(16, 24, 39, 0.05) 1px, transparent 1px),
          linear-gradient(180deg, rgba(16, 24, 39, 0.04) 1px, transparent 1px),
          var(--bg);
        background-size: auto, auto, 44px 44px, 44px 44px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(115deg, transparent 0 58%, rgba(15, 118, 110, 0.09) 58% 59%, transparent 59%),
          linear-gradient(115deg, transparent 0 68%, rgba(37, 99, 235, 0.08) 68% 69%, transparent 69%);
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        right: 7vw;
        top: 18vh;
        z-index: -1;
        width: 240px;
        height: 240px;
        border: 1px solid rgba(15, 118, 110, 0.16);
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.32);
        filter: blur(1px);
        animation: drift 12s ease-in-out infinite;
        pointer-events: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a,
      button,
      summary {
        -webkit-tap-highlight-color: transparent;
      }

      a:focus-visible,
      button:focus-visible,
      summary:focus-visible {
        outline: 3px solid rgba(15, 118, 110, 0.28);
        outline-offset: 3px;
      }

      button {
        font: inherit;
      }

      .progress {
        position: fixed;
        inset: 0 auto auto 0;
        z-index: 50;
        width: var(--progress, 0%);
        height: 4px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .shell {
        width: min(1200px, calc(100% - 28px));
        margin: 18px auto 42px;
      }

      .nav {
        position: sticky;
        top: 12px;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px;
        border: 1px solid rgba(220, 229, 232, 0.9);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 14px 36px rgba(16, 24, 39, 0.08);
        backdrop-filter: blur(18px);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .nav:hover {
        transform: translateY(-1px);
        border-color: rgba(15, 118, 110, 0.25);
        box-shadow: 0 18px 44px rgba(16, 24, 39, 0.11);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding-left: 5px;
        font-weight: 900;
      }

      .mark {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--dark);
        color: #ffffff;
        transition: transform 220ms ease, background 220ms ease;
      }

      .brand:hover .mark {
        transform: rotate(-8deg) scale(1.05);
        background: var(--accent);
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 4px;
      }

      .nav-links a,
      .nav-action {
        border: 0;
        border-radius: 999px;
        padding: 9px 13px;
        background: transparent;
        color: var(--muted);
        font-weight: 800;
        font-size: 0.88rem;
        cursor: pointer;
        transition: color 160ms ease, background 160ms ease, transform 160ms ease;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--ink);
        background: var(--soft);
        transform: translateY(-1px);
      }

      .nav-action {
        color: #ffffff;
        background: var(--accent);
      }

      .nav-action:hover {
        transform: translateY(-1px);
        background: var(--dark);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 370px;
        gap: 18px;
        margin-top: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        animation: fadeUp 520ms ease both;
      }

      .hero-main {
        position: relative;
        min-height: 580px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
        background:
          linear-gradient(135deg, #ffffff 0%, #f9fcfb 54%, #eef7f5 100%);
      }

      .hero-main::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(15, 118, 110, 0.09) 1px, transparent 1px),
          linear-gradient(180deg, rgba(15, 118, 110, 0.07) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: linear-gradient(90deg, transparent 0%, #000 56%, #000 100%);
        opacity: 0.7;
      }

      .hero-main::after {
        content: "";
        position: absolute;
        right: 34px;
        top: 46px;
        width: 260px;
        height: 300px;
        border: 1px solid rgba(15, 118, 110, 0.18);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.34)),
          repeating-linear-gradient(0deg, rgba(16, 24, 39, 0.08) 0 1px, transparent 1px 42px);
        opacity: 0.55;
      }

      .hero-copy {
        position: relative;
        z-index: 1;
        padding: 58px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        width: fit-content;
        margin-bottom: 22px;
        padding: 8px 12px;
        border: 1px solid rgba(15, 118, 110, 0.22);
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.08);
        color: var(--accent);
        font-size: 0.86rem;
        font-weight: 900;
      }

      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(15, 118, 110, 0.14);
        animation: pulse 2.4s ease-in-out infinite;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      h1 {
        max-width: 840px;
        margin: 0;
        font-size: clamp(3rem, 7vw, 6.4rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .headline {
        max-width: 780px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 1.12rem;
      }

      .platform-map {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        max-width: 680px;
        margin-top: 30px;
      }

      .platform-node {
        position: relative;
        min-height: 82px;
        display: grid;
        align-content: space-between;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(220, 229, 232, 0.95);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 12px 28px rgba(16, 24, 39, 0.06);
        backdrop-filter: blur(10px);
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .platform-node::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent 0 35%, rgba(255, 255, 255, 0.72) 48%, transparent 62% 100%);
        transform: translateX(-130%);
        transition: transform 520ms ease;
      }

      .platform-node:hover {
        transform: translateY(-4px);
        border-color: rgba(15, 118, 110, 0.34);
        box-shadow: 0 18px 38px rgba(16, 24, 39, 0.1);
      }

      .platform-node:hover::before {
        transform: translateX(130%);
      }

      .platform-node strong {
        font-size: 0.88rem;
      }

      .platform-node span {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 750;
      }

      .hero-footer {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        border-top: 1px solid var(--line);
        background: var(--soft);
      }

      .hero-stat {
        padding: 22px;
        border-right: 1px solid var(--line);
        transition: background 180ms ease, transform 180ms ease;
      }

      .hero-stat:hover {
        background: #ffffff;
        transform: translateY(-2px);
      }

      .hero-stat:last-child {
        border-right: 0;
      }

      .hero-stat strong {
        display: block;
        font-size: 1.6rem;
        line-height: 1;
      }

      .hero-stat span {
        display: block;
        margin-top: 7px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .profile {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 28%),
          linear-gradient(135deg, #17212b, #223342);
        color: #ffffff;
        transition: transform 220ms ease, box-shadow 220ms ease;
      }

      .profile:hover {
        transform: translateY(-3px);
        box-shadow: 0 28px 80px rgba(16, 24, 39, 0.2);
      }

      .portrait {
        position: relative;
        aspect-ratio: 4 / 5;
        display: grid;
        place-items: center;
        overflow: hidden;
        margin: 18px 18px 0;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 16px;
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.62), rgba(255, 255, 255, 0.08)),
          linear-gradient(180deg, #243544, #17212b);
        font-size: 4rem;
        font-weight: 950;
        box-shadow: 0 24px 54px rgba(0, 0, 0, 0.24);
        transition: transform 260ms ease, border-color 260ms ease;
      }

      .portrait:hover {
        transform: scale(1.015);
        border-color: rgba(255, 255, 255, 0.36);
      }

      .portrait img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center top;
        transition: transform 420ms ease, filter 420ms ease;
      }

      .portrait:hover img {
        transform: scale(1.045);
        filter: saturate(1.04) contrast(1.03);
      }

      .portrait::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 38%;
        background: linear-gradient(180deg, transparent, rgba(23, 33, 43, 0.78));
      }

      .fallback {
        width: 100%;
        height: 100%;
        display: none;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.62), rgba(37, 99, 235, 0.16)),
          linear-gradient(180deg, #243544, #17212b);
      }

      .contact {
        display: grid;
        gap: 14px;
        padding: 24px;
      }

      .contact-row {
        display: grid;
        gap: 3px;
      }

      .contact-row span {
        color: rgba(255, 255, 255, 0.58);
        font-size: 0.76rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .contact-row a,
      .contact-row p {
        margin: 0;
        overflow-wrap: anywhere;
        color: #ffffff;
        font-size: 0.94rem;
      }

      .contact-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 4px;
      }

      .contact-links a {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(255, 255, 255, 0.07);
        color: #ffffff;
        font-weight: 800;
        font-size: 0.85rem;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      }

      .contact-links a:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.13);
      }

      .content {
        display: grid;
        grid-template-columns: 330px minmax(0, 1fr);
        gap: 18px;
        margin-top: 18px;
      }

      .sidebar {
        display: grid;
        align-self: start;
        gap: 18px;
        position: sticky;
        top: 92px;
      }

      .panel {
        padding: 24px;
      }

      .main {
        display: grid;
        gap: 18px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      h2 {
        margin: 0;
        color: var(--ink);
        font-size: 1.05rem;
        line-height: 1.2;
      }

      h3 {
        margin: 0;
      }

      .section-label {
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      p {
        margin: 0;
      }

      .muted {
        color: var(--muted);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--soft);
        color: #2f3d47;
        font-size: 0.82rem;
        font-weight: 820;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .chip:hover {
        transform: translateY(-2px);
        border-color: rgba(15, 118, 110, 0.45);
        background: rgba(15, 118, 110, 0.08);
        box-shadow: 0 10px 20px rgba(15, 118, 110, 0.08);
      }

      .impact {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .impact-card {
        min-height: 132px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 18px;
        border-radius: 14px;
        background: var(--dark);
        color: #ffffff;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .impact-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 18px 42px rgba(16, 24, 39, 0.16);
      }

      .impact-card:nth-child(2) {
        background: var(--accent);
      }

      .impact-card:nth-child(3) {
        background: var(--dark-2);
      }

      .impact-card strong {
        display: block;
        font-size: 1.8rem;
        line-height: 1;
      }

      .impact-card span {
        color: rgba(255, 255, 255, 0.74);
        font-size: 0.84rem;
      }

      .timeline {
        display: grid;
        gap: 14px;
      }

      .role {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        overflow: hidden;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      .role:hover {
        transform: translateY(-2px);
        border-color: rgba(15, 118, 110, 0.32);
        box-shadow: 0 14px 34px rgba(16, 24, 39, 0.08);
      }

      .role summary {
        list-style: none;
        cursor: pointer;
      }

      .role summary::-webkit-details-marker {
        display: none;
      }

      .role-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 14px;
        padding: 18px;
      }

      .role-title h3 {
        font-size: 1.05rem;
      }

      .role-title p {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .date {
        color: var(--gold);
        font-size: 0.8rem;
        font-weight: 950;
        white-space: nowrap;
      }

      .toggle {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        color: var(--accent);
        font-weight: 950;
        transition: transform 180ms ease, background 180ms ease;
      }

      .toggle::before {
        content: "+";
      }

      .role[open] .toggle::before {
        content: "-";
      }

      .role[open] .toggle {
        transform: rotate(180deg);
        background: rgba(15, 118, 110, 0.08);
      }

      .role ul {
        margin: 0;
        padding: 0 22px 20px 40px;
        color: var(--muted);
      }

      .role li + li {
        margin-top: 8px;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .filter {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 13px;
        background: var(--surface);
        color: var(--muted);
        font-weight: 850;
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
      }

      .filter:hover {
        transform: translateY(-2px);
        border-color: rgba(15, 118, 110, 0.34);
      }

      .filter.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .project-grid,
      .portfolio-grid {
        display: grid;
        gap: 14px;
      }

      .project-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .portfolio-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .project,
      .portfolio-card {
        position: relative;
        display: grid;
        gap: 14px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
        overflow: hidden;
      }

      .project::before,
      .portfolio-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.08), transparent 42%);
        opacity: 0;
        transition: opacity 180ms ease;
        pointer-events: none;
      }

      .portfolio-card {
        min-height: 180px;
      }

      .project:hover,
      .portfolio-card:hover {
        transform: translateY(-4px);
        border-color: rgba(15, 118, 110, 0.42);
        box-shadow: 0 18px 44px rgba(16, 24, 39, 0.1);
      }

      .project:hover::before,
      .portfolio-card:hover::before {
        opacity: 1;
      }

      .hidden {
        display: none;
      }

      .project-type {
        width: fit-content;
        border-radius: 999px;
        padding: 6px 9px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent);
        font-size: 0.76rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .project-skills {
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 850;
      }

      .portfolio-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .portfolio-bullet {
        width: 11px;
        height: 11px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(15, 118, 110, 0.1);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .portfolio-card:hover .portfolio-bullet {
        transform: scale(1.15);
        box-shadow: 0 0 0 8px rgba(15, 118, 110, 0.08);
      }

      .portfolio-link {
        color: var(--accent);
        font-size: 0.82rem;
