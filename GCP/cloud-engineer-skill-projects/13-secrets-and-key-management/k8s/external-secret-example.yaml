apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-reader
  namespace: app
  annotations:
    iam.gke.io/gcp-service-account: secret-reader@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-demo
  namespace: app
spec:
  selector:
    matchLabels:
      app: secret-demo
  template:
    metadata:
      labels:
        app: secret-demo
    spec:
      serviceAccountName: secret-reader
      containers:
        - name: app
          image: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
          command: ["sh", "-c", "gcloud secrets versions access latest --secret app-config && sleep 3600"]

