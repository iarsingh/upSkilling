groups:
  - name: ml-inference-slo
    rules:
      - alert: MLInferenceHighP99Latency
        expr: histogram_quantile(0.99, rate(inference_latency_ms_bucket[5m])) > 300
        for: 10m
        labels:
          severity: page
        annotations:
          summary: ML inference p99 latency is above 300ms.
      - alert: MLInferenceHighErrorRate
        expr: rate(inference_requests_total{status="error"}[5m]) / rate(inference_requests_total[5m]) > 0.02
        for: 10m
        labels:
          severity: page
        annotations:
          summary: ML inference error rate is above 2%.
      - alert: MLModelDriftDetected
        expr: model_drift_score > 0.2
        for: 30m
        labels:
          severity: ticket
        annotations:
          summary: Model drift score exceeded configured threshold.
