apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-inference
  namespace: ml-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-inference
  template:
    metadata:
      labels:
        app: churn-inference
    spec:
      containers:
        - name: inference-api
          image: us-central1-docker.pkg.dev/example/ml/churn-inference:latest
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_URI
              value: gs://PROJECT_ID-ml-platform-models/churn/production/model.json
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: churn-inference
  namespace: ml-platform
spec:
  selector:
    app: churn-inference
  ports:
    - port: 80
      targetPort: 8080
