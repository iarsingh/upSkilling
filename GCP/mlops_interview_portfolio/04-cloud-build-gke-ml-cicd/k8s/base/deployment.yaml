apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-inference
  namespace: ml-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-inference
  template:
    metadata:
      labels:
        app: churn-inference
    spec:
      containers:
        - name: churn-inference
          image: us-central1-docker.pkg.dev/PROJECT_ID/ml-services/churn-inference:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
