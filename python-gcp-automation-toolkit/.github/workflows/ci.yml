name: Python GCP Automation Toolkit CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint and test
        run: |
          ruff check src tests
          pytest -q

      - name: Verify CLI package
        run: |
          gcp-ops --help
          gcp-ops vertex --help
          python -m build

      - name: Build API image
        run: docker build -t gcp-ops-toolkit:${GITHUB_SHA} .
