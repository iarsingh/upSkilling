name: Docker Build and Cloud Run Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "projects/docker-cloud-run/**"
      - ".github/workflows/docker-cloud-run.yml"

permissions:
  contents: read
  id-token: write

env:
  REGION: us-central1
  SERVICE_NAME: github-actions-cloud-run-demo
  IMAGE_NAME: github-actions-cloud-run-demo

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/docker-cloud-run
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/github-actions/$IMAGE_NAME:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated

