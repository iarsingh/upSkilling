name: Python CI

on:
  push:
    paths:
      - "projects/python-ci/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "projects/python-ci/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/python-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

