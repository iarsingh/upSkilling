apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: model-serving
      containers:
        - name: mlflow
          image: us-central1-docker.pkg.dev/PROJECT_ID/mlops/mlflow:bootstrap
          args:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=$(DATABASE_URL)
            - --default-artifact-root=gs://MLFLOW_BUCKET/mlflow
            - --serve-artifacts
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mlflow-db
                  key: database-url
          ports:
            - name: http
              containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - --structured-logs
            - --port=5432
            - PROJECT_ID:us-central1:mlflow-postgres
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops-demo
spec:
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: http
