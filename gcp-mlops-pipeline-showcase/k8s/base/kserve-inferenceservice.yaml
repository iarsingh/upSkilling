apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: diabetes-regressor
  namespace: mlops-demo
  annotations:
    serving.kserve.io/deploymentMode: Serverless
    autoscaling.knative.dev/class: kpa.autoscaling.knative.dev
    autoscaling.knative.dev/metric: concurrency
    autoscaling.knative.dev/target: "10"
    autoscaling.knative.dev/min-scale: "1"
    autoscaling.knative.dev/max-scale: "10"
spec:
  predictor:
    serviceAccountName: model-serving
    containers:
      - name: kserve-container
        image: us-central1-docker.pkg.dev/PROJECT_ID/mlops/model-serving:bootstrap
        env:
          - name: MODEL_URI
            value: gs://MODEL_BUCKET/models/diabetes/latest/model.joblib
          - name: MODEL_NAME
            value: diabetes-regressor
          - name: MODEL_VERSION
            value: bootstrap
          - name: PREDICTION_LOG_BUCKET
            value: PREDICTION_BUCKET
        ports:
          - containerPort: 8080
            protocol: TCP
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
