apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: mlops
  labels:
    app: model-serving
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
    spec:
      serviceAccountName: model-serving
      containers:
        - name: model-serving
          image: us-docker.pkg.dev/cloudrun/container/hello
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_BUCKET
              value: REPLACE_WITH_TERRAFORM_OUTPUT_MODEL_ARTIFACT_BUCKET
            - name: MODEL_VERSION
              value: v1
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: model-serving
  namespace: mlops
  labels:
    app: model-serving
spec:
  type: ClusterIP
  selector:
    app: model-serving
  ports:
    - name: http
      port: 80
      targetPort: 8080

