<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="AI Interviewer avatar">
  <defs>
    <linearGradient id="head-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#0f151d"/>
    </linearGradient>
    <linearGradient id="eye-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5be8f5"/>
      <stop offset="100%" stop-color="#28b8c7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#28b8c7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#28b8c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="60" cy="60" r="58" fill="url(#glow)"/>

  <!-- antenna -->
  <line x1="60" y1="14" x2="60" y2="26" stroke="#3b4758" stroke-width="4" stroke-linecap="round"/>
  <circle cx="60" cy="11" r="6" fill="#e6ae48"/>

  <!-- ears -->
  <rect x="16" y="46" width="10" height="22" rx="4" fill="#20262f" stroke="#3b4758" stroke-width="2"/>
  <rect x="94" y="46" width="10" height="22" rx="4" fill="#20262f" stroke="#3b4758" stroke-width="2"/>

  <!-- head -->
  <rect x="26" y="26" width="68" height="60" rx="20" fill="url(#head-fill)" stroke="#3b4758" stroke-width="3"/>

  <!-- face screen -->
  <rect x="36" y="38" width="48" height="34" rx="12" fill="#060a10"/>

  <!-- eyes -->
  <circle cx="51" cy="55" r="6" fill="url(#eye-fill)"/>
  <circle cx="69" cy="55" r="6" fill="url(#eye-fill)"/>

  <!-- smile -->
  <path d="M48 63c3.5 3 8.5 4.5 12 4.5s8.5-1.5 12-4.5" fill="none" stroke="#9b8cff" stroke-width="3" stroke-linecap="round"/>
</svg>
