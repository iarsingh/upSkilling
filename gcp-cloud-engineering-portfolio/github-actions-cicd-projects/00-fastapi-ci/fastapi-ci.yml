name: fastapi-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r GCP/python-fastapi-projects/08-fastapi-devops-release-api/requirements.txt
      - run: python -m py_compile GCP/python-fastapi-projects/08-fastapi-devops-release-api/app/main.py

