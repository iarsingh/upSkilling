apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-provider-credentials
  namespace: aegis-agents
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: llm-provider-credentials
  data:
    - secretKey: api-key
      remoteRef:
        key: llm-provider-api-key
