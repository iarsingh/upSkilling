---
apiVersion: v1
kind: Namespace
metadata:
  name: ansible-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-api
  namespace: ansible-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ansible-api
  template:
    metadata:
      labels:
        app: ansible-api
    spec:
      containers:
        - name: api
          image: us-docker.pkg.dev/google-samples/containers/gke/hello-app:1.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ansible-api
  namespace: ansible-demo
spec:
  selector:
    app: ansible-api
  ports:
    - port: 80
      targetPort: 8080

