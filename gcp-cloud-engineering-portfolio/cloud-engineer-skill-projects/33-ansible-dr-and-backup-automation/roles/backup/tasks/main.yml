---
- name: Create backup directory
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0750"

- name: Set backup archive path
  ansible.builtin.set_fact:
    archive_path: "{{ backup_dir }}/{{ inventory_hostname }}-{{ ansible_date_time.date }}.tgz"

- name: Dump PostgreSQL database
  ansible.builtin.command:
    cmd: "pg_dump {{ database_name }} --file {{ backup_dir }}/{{ database_name }}.sql"
  changed_when: true

- name: Archive configuration and database dump
  ansible.builtin.archive:
    path:
      - /etc
      - "{{ backup_dir }}/{{ database_name }}.sql"
    dest: "{{ archive_path }}"
    format: gz

- name: Upload backup archive to GCS
  ansible.builtin.command:
    cmd: "gsutil cp {{ archive_path }} {{ backup_bucket }}/"
  changed_when: true

- name: Write backup report
  ansible.builtin.template:
    src: backup-report.j2
    dest: "{{ backup_dir }}/backup-report.txt"
    mode: "0640"

