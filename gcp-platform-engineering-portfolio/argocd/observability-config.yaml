apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-observability-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/gcp-platform-engineering-portfolio.git
    targetRevision: main
    path: observability
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
