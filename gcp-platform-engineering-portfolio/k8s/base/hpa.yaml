apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-sample-api
  namespace: platform-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-sample-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

