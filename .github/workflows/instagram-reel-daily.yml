name: Daily Instagram Reel

on:
  schedule:
    # 09:00 Asia/Kolkata every day.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the next Reel without publishing it"
        required: false
        default: true
        type: boolean
      verify_only:
        description: "Verify Instagram secrets without publishing"
        required: false
        default: false
        type: boolean
      filename:
        description: "Optional exact MP4 filename from reel-generator/output/narrated"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: instagram-reel-daily
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-branding-and-content/content-automation
    env:
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      INSTAGRAM_API_VERSION: ${{ vars.INSTAGRAM_API_VERSION }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      VERIFY_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.verify_only || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate Instagram secrets
        if: ${{ env.DRY_RUN != 'true' || env.VERIFY_ONLY == 'true' }}
        run: |
          test -n "$INSTAGRAM_ACCESS_TOKEN"
          test -n "$INSTAGRAM_ACCOUNT_ID"

      - name: Publish next Reel
        env:
          REQUESTED_FILENAME: ${{ inputs.filename }}
        run: |
          args=()
          if [ "$VERIFY_ONLY" = "true" ]; then
            args+=(--verify)
          elif [ -n "$REQUESTED_FILENAME" ]; then
            args+=(--filename "$REQUESTED_FILENAME")
          fi
          node src/publish-instagram-reel.js "${args[@]}"

      - name: Persist publish state and remove published Reel
        if: ${{ env.DRY_RUN != 'true' && env.VERIFY_ONLY != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram-publish-state.json
          git add -u reel-generator/output
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record published Instagram Reel"
          git pull --rebase origin main
          git push origin HEAD:main
