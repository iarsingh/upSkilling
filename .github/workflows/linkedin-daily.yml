name: Daily LinkedIn Publish

on:
  schedule:
    # 09:30, 14:30, and 19:30 Asia/Kolkata.
    - cron: "0 4 * * *"
    - cron: "0 9 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Optional date to publish, YYYY-MM-DD. Defaults to today in Asia/Kolkata."
        required: false
        type: string
      publish_slot:
        description: "Optional slot to publish, for example 09:30, 14:30, or 19:30. Defaults to all slots for the date."
        required: false
        type: string

concurrency:
  group: linkedin-daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin/content-automation
    env:
      TIMEZONE: Asia/Kolkata
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
      PUBLISH_DATE: ${{ inputs.publish_date }}
      PUBLISH_SLOT: ${{ inputs.publish_slot || (github.event.schedule == '0 4 * * *' && '09:30') || (github.event.schedule == '0 9 * * *' && '14:30') || (github.event.schedule == '0 14 * * *' && '19:30') || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate LinkedIn secrets
        run: |
          test -n "$LINKEDIN_ACCESS_TOKEN"
          test -n "$LINKEDIN_AUTHOR_URN"

      - name: Publish scheduled post
        run: node src/publish-calendar-date.js
