name: Daily LinkedIn Publish

on:
  schedule:
    # 06:00, 09:00, and 00:00 Asia/Kolkata.
    - cron: "30 0 * * *"
    - cron: "30 3 * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Optional date to publish, YYYY-MM-DD. Defaults to today in Asia/Kolkata."
        required: false
        type: string
      publish_slot:
        description: "Optional calendar slot to publish. Leave blank to publish all posts for the date."
        required: false
        type: string

concurrency:
  group: linkedin-daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-branding-and-content/content-automation
    env:
      TIMEZONE: Asia/Kolkata
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
      PUBLISH_DATE: ${{ inputs.publish_date }}
      PUBLISH_SLOT: ${{ inputs.publish_slot || (github.event.schedule == '30 0 * * *' && '09:30') || (github.event.schedule == '30 3 * * *' && '14:30') || (github.event.schedule == '30 18 * * *' && '19:30') || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate LinkedIn secrets
        run: |
          test -n "$LINKEDIN_ACCESS_TOKEN"
          test -n "$LINKEDIN_AUTHOR_URN"

      - name: Publish scheduled post
        run: node src/publish-calendar-date.js
