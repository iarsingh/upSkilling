name: Daily LinkedIn Publish

on:
  schedule:
    # 09:00 Asia/Kolkata, Monday-Friday.
    - cron: "30 3 * * 1-5"
    # 10:30 Asia/Kolkata, Saturday.
    - cron: "0 5 * * 6"
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Optional date to publish, YYYY-MM-DD. Defaults to today in Asia/Kolkata."
        required: false
        type: string
      publish_slot:
        description: "Optional calendar slot to publish. Leave blank to publish all posts for the date."
        required: false
        type: string

concurrency:
  group: linkedin-daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-branding-and-content/content-automation
    env:
      TIMEZONE: Asia/Kolkata
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
      PUBLISH_DATE: ${{ inputs.publish_date }}
      PUBLISH_SLOT: ${{ inputs.publish_slot }}
      PUBLISH_MODE: weekly-rotation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate LinkedIn secrets
        run: |
          test -n "$LINKEDIN_ACCESS_TOKEN"
          test -n "$LINKEDIN_AUTHOR_URN"

      - name: Publish scheduled post
        run: node src/publish-calendar-date.js
