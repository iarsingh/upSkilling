name: Daily YouTube Short

on:
  schedule:
    # 09:00 Asia/Kolkata every day.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the next Short without uploading"
        required: false
        default: true
        type: boolean
      filename:
        description: "Optional exact filename from youtube-shorts-automation/content"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: youtube-short-daily
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-shorts-automation
    env:
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || 'private' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate YouTube secrets
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          test -n "$YOUTUBE_CLIENT_ID"
          test -n "$YOUTUBE_CLIENT_SECRET"
          test -n "$YOUTUBE_REFRESH_TOKEN"

      - name: Upload next Short
        env:
          REQUESTED_FILENAME: ${{ inputs.filename }}
        run: node src/upload-short.js

      - name: Persist upload state and remove uploaded Short
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upload-state.json
          git add -u content
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record uploaded YouTube Short"
          git pull --rebase origin main
          git push origin HEAD:main
